name: Devin Security Scan on PR
 
on:
  pull_request:
    types: [opened, reopened, synchronize]
 
jobs:
  devin-security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Devin security scan
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
        run: |
          payload=$(jq -n \
            --arg prompt "Run a security scan on PR #${PR_NUMBER} in ${REPO}.\n\nPR Title: ${PR_TITLE}\nPR URL: ${PR_URL}\nBase: ${PR_BASE}\nHead: ${PR_HEAD}" \
            --arg playbook_id "playbook-17906238791946a9b29fe7cfe5b1ec5d" \
            --arg repo "$REPO" \
            '{prompt: $prompt, playbook_id: $playbook_id, repos: [$repo]}')

          curl -s -X POST "https://api.devin.ai/v3/organizations/$DEVIN_ORG_ID/sessions" \
            -H "Authorization: Bearer $DEVIN_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload"
