name: Devin Security Pipeline (Scan → Fix → Re-scan)

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  devin-security-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Devin security pipeline
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.devin.ai/v3/organizations/$DEVIN_ORG_ID/sessions" \
            -H "Authorization: Bearer $DEVIN_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "prompt": "Run the security pipeline on PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.\n\nPR Title: ${{ github.event.pull_request.title }}\nPR URL: ${{ github.event.pull_request.html_url }}\nBase branch: ${{ github.event.pull_request.base.ref }}\nHead branch: ${{ github.event.pull_request.head.ref }}",
            "playbook_id": "playbook-4491fa6c3a2f41ee9c3b4eb7eb6a38d3",
            "repos": ["${{ github.repository }}"],
            "max_acu_limit": 50
          }
          EOF
          )")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "Response status: $http_code"
          echo "Response body: $body"

          if [ "$http_code" -ge 400 ]; then
            echo "::error::Failed to trigger Devin security pipeline (HTTP $http_code)"
            exit 1
          fi

          session_url=$(echo "$body" | jq -r '.url // empty')
          if [ -n "$session_url" ]; then
            echo "::notice::Devin security pipeline started: $session_url"
          fi
          